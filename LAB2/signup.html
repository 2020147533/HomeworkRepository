<!DOCTYPE html>
<html>
    <head>
        <title>signup</title>
    </head>
    <body>
        <h1>Welcome to INTERNET-PROGRAMMING SHOP</h1>
        <ul>
            <!---<li><a href="login.html">로그인</a></li>>
            <li><a href="signup.html">회원가입</a></li>-->
            <li>로그인<a href="https://youtube.com"></a></li>
            <li>회원가입<a href="https://2020147533.github.io/HomeworkRepository/LAB2/signup.html"></a></li>
        </ul>
        <p>개인정보 (필수)</p>
        <form method= "get" autocomplete="on" action="signup.html">
            <p><label>이름:
                <input type= "text" name= "name" autofocus autocomplete="off"/>
            </label></p>
            <p><label>생일:
                <input type= "date" name= "date" />
            </label></p>
            <p><label>학년:
                <input type="text" name="grade" placeholder= "2" autocomplete="off">
            <p><label>전화번호:
                <input type="tel" name="tel" pattern = "\(\d{3}\)\d{4}-\d{4}" required/>
            </label></p>
            <p><label>유저아이디:
                <input type="text" name="ID" required autocomplete="off"/>
            </label></p>
            <p><label>비밀번호:
                <input type="text" name="password" required autocomplete="off"/>
            </label></p>
            <p><label>비밀번호확인:
                <input type="text" name="checkpass" required autocomplete="off"/>
            </label></p>
            <p>
                <input type= "submit" value= "Signup">
                <input type= "reset" value= "Clear">
            </p>



        </form>
    </body>
